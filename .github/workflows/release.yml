name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: windows-latest
            os-name: Windows
            target: x86_64-pc-windows-msvc
            bin: project-folder-manager.exe
            asset-name: project-folder-manager-windows.zip
            run: powershell Compress-Archive -Path target/release/project-folder-manager.exe -DestinationPath project-folder-manager-windows.zip
          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu
            bin: project-folder-manager
            asset-name: project-folder-manager-linux.tar.gz
            run: tar -czf project-folder-manager-linux.tar.gz -C target/release project-folder-manager
          - os: macos-latest
            os-name: macOS
            target: x86_64-apple-darwin
            bin: project-folder-manager
            asset-name: project-folder-manager-macos.zip
            run: zip -j project-folder-manager-macos.zip target/release/project-folder-manager

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-xcb-dev libxkbcommon-dev libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Rename binary for platform matching (Unix only)
        if: matrix.platform.os != 'windows-latest'
        run: |
          mkdir -p target/release
          mv target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} target/release/${{ matrix.platform.bin }}
        shell: bash

      - name: Rename binary for platform matching (Windows only)
        if: matrix.platform.os == 'windows-latest'
        run: |
          mkdir -p target/release
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} target/release/${{ matrix.platform.bin }}
        shell: bash

      - name: Package asset
        run: ${{ matrix.platform.run }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.platform.asset-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
